<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NAPNE</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light"> <header class="header">
        <div class="container header-content">
            <div class="logo">
                <div class="logo-icon">N</div>
                <div>
                    <strong>NAPNE</strong>
                    <span>Núcleo de Atendimento</span>
                </div>
            </div>
            
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Voltar para a Home
            </a>
        </div>
    </header>

    <main class="login-wrapper">
        <div class="login-card">
            <div class="login-header-text">
                <h1>Acesso Restrito</h1>
                <p>Faça login para acessar o sistema</p>
            </div>

            <form action="#" class="login-form">
                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <div class="input-container">
                        <i class="far fa-user input-icon"></i>
                        <input type="text" id="cpf" placeholder="000.000.000-00" required aria-label="Digite seu CPF">
                    </div>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="input-container">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="senha" placeholder="Digite sua senha" required aria-label="Digite sua senha">
                        <button type="button" class="toggle-password" aria-label="Mostrar senha">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="forgot-password">
                    <a href="#">Esqueci a senha</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Entrar</button>

                <div class="register-link">
                    <p>Não tenho cadastro. <a href="#">Como proceder?</a></p>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
